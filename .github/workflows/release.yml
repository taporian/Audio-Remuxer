name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
            arch: arm64
            artifact: '*-arm64.dmg'
          - os: macos-latest
            platform: mac-x64
            arch: x64
            artifact: '*-x64.dmg'
          - os: windows-latest
            platform: win
            arch: x64
            artifact: '*.exe'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build app (macOS ARM64)
        if: matrix.platform == 'mac-arm64'
        run: npm run build:mac:arm
      
      - name: Build app (macOS Intel)
        if: matrix.platform == 'mac-x64'
        run: npm run build:mac:intel
      
      - name: Build app (Windows)
        if: matrix.platform == 'win'
        run: npm run build:win
      
      - name: List build artifacts (macOS)
        if: matrix.platform == 'mac-arm64' || matrix.platform == 'mac-x64'
        run: ls -la dist/
        
      - name: List build artifacts (Windows)
        if: matrix.platform == 'win'
        run: dir dist/
      
      - name: Upload artifacts to release (macOS)
        if: (matrix.platform == 'mac-arm64' || matrix.platform == 'mac-x64') && github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts to release (Windows)
        if: matrix.platform == 'win' && github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts to workflow (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: dist/${{ matrix.artifact }}
